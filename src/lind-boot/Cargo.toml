debug-grate-calls = ["wasmtime-lind-3i/debug-grate-calls"]
# Use the old asyncify-unwind/rewind based setjmp/longjmp instead of the default wasm-EH
# based one. Requires glibc and user programs compiled without -fwasm-exceptions
# (set LIND_ASYNCIFY_SETJMP=1 when running the build scripts).
asyncify-setjmp = ["wasmtime/asyncify-setjmp", "wasmtime-lind-common/asyncify-setjmp"]
# Pass-through selectors for the fdtables backend. Pick exactly one.
fdtables-dashmaparray = ["rawposix/fdtables-dashmaparray"]
fdtables-dashmapvec = ["rawposix/fdtables-dashmapvec"]
fdtables-muthashmax = ["rawposix/fdtables-muthashmax"]
fdtables-vanilla = ["rawposix/fdtables-vanilla"]

[dependencies]
wasmtime-lind-common = { path = "../wasmtime/crates/lind-common" }
wasmtime-lind-dylink = { path = "../wasmtime/crates/lind-dylink" }
wasmtime-lind-multi-process = { path = "../wasmtime/crates/lind-multi-process" }
wasmtime-lind-utils = { path = "../wasmtime/crates/lind-utils" }
rawposix = { path = "../wasmtime/crates/rawposix" }
cage = { path = "../wasmtime/crates/cage" }
threei = { path = "../wasmtime/crates/threei" }
sysdefs = { path = "../wasmtime/crates/sysdefs" }
typemap = { path = "../wasmtime/crates/typemap" }
wasmtime-lind-3i = { path = "../wasmtime/crates/lind-3i" }
wasmtime = { path = "../wasmtime/crates/wasmtime", features = ["cranelift", "pooling-allocator", "gc-null", "threads", "demangle", "addr2line", "cache", "anyhow"], default-features = false }
wasmtime-wasi = { version = "23.0.0", features = ["preview1"] , default-features = false }

anyhow = { version = "1.0.66", default-features = false }
clap = { version = "4", features = ["derive"] }
cfg-if = "1.0"
libc = "0.2"
lind-remote-lib = { path = "../wasmtime/crates/lind-remote-lib" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[[bin]]
name = "lind-remote-server"
path = "src/bin/remote_server.rs"
